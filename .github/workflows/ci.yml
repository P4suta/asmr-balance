name: CI

on:
  push:
    branches: [main, "redesign/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Static lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run basedpyright --level error src tests
      - run: uv run bandit -c pyproject.toml -r src
      - run: uv run vulture src --min-confidence 70

  defensive:
    name: Defensive grep gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Defensive gates
        shell: bash
        run: |
          set -e
          fail() { echo "::error::$1"; exit 1; }
          ! rg -nP '^\s*print\(' src/ tests/ || fail "print() forbidden — use structlog"
          ! rg -nP '#\s*TODO(?!\(#\d+\))' src/ || fail "TODO must include (#issue)"
          ! rg -nP '#\s*type:\s*ignore(?!\[[\w,-]+\])' src/ || fail "# type: ignore must specify rule code"
          ! rg -nP '#\s*noqa(?!:\s*\w+)' src/ || fail "# noqa must specify rule code"
          ! rg -nP '#\s*noqa(?!:\s*\w+)' src/asmr_balance/ || fail "no bare noqa in src/asmr_balance/"
          ! rg -nP '#\s*type:\s*ignore' src/asmr_balance/ || fail "no type: ignore in src/asmr_balance/"
          ! rg -nP '\.(z_blocks|_acc_l|_acc_r|_zi_l|_zi_r)\b' src/ || fail "no private DSP state access"
          ! rg -nP '^\s*except\s*:' src/ || fail "bare except forbidden"
          ! rg -nP '\beval\(|\bexec\(' src/ || fail "eval/exec forbidden"
          ! rg -nP 'continue-on-error:\s*true' .github/ || fail "continue-on-error forbidden — fix the root cause"
          ! rg -nP '\b__import__\(' src/ || fail "dynamic __import__ forbidden"
          echo "✓ defensive gates passed"

  actionlint:
    name: GHA workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@main

  test:
    name: Test + coverage (branch 100%)
    runs-on: ubuntu-latest
    needs: [lint, defensive]
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv run pytest
      - uses: codecov/codecov-action@v4
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          file: coverage.xml
          fail_ci_if_error: true

  # Mutation testing intentionally lives outside CI — see Justfile `just mutate`
  # for the local recipe. Running mutmut on every commit would balloon the
  # CI budget without telling us anything useful most of the time; we keep
  # the 80% kill-rate as a release-time check, not a per-PR gate.

  audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv run pip-audit

  secrets:
    name: trufflehog (verified secrets)
    runs-on: ubuntu-latest
    # PR-only: on push events the action needs a stable BASE to diff against
    # (and silently fails on branches with single-commit history). Pre-commit
    # ``gitleaks`` already covers local push protection; trufflehog focuses on
    # the *diff* the maintainer is about to merge.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
