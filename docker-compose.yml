services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: asmr-balance:dev
    working_dir: /app
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
      - venv:/opt/venv
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /opt/venv
      HYPOTHESIS_PROFILE: ${HYPOTHESIS_PROFILE:-dev}
    init: true
    stdin_open: true
    tty: true

volumes:
  uv-cache:
  venv:
